# Production broker configuration.
# Anonymous access is disabled. All clients must authenticate.
# Password file must be pre-generated and mounted at /mosquitto/config/passwd.
#
# To generate the password file on the host:
#   docker run --rm eclipse-mosquitto:2 mosquitto_passwd -c /tmp/passwd pls-backend
#   # Enter PLS_MQTT_PASSWORD when prompted, then copy the file to ./mosquitto/passwd
#
# Topic ACLs (acl_file): restrict pls-backend to publish only on pls/#
# and deny all wildcard subscriptions from client devices.
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl
persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type warning
log_type error
